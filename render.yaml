services:
  - type: web
    name: youtube-channel-intelligence
    runtime: docker
    plan: free
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_COOKIES_BASE64
        sync: false
      - key: GROQ_TRANSCRIBE_MODEL
        value: whisper-large-v3-turbo
      - key: GROQ_SUMMARY_MODEL
        value: llama-3.1-8b-instant
      - key: AUDIO_BITRATE
        value: 32k
      - key: AUDIO_SAMPLE_RATE
        value: "16000"
      - key: AUDIO_CHANNELS
        value: "1"
      - key: AUDIO_CHUNK_SECONDS
        value: "600"
      - key: MAX_AUDIO_BYTES
        value: "26214400"
      - key: AUDIO_COMMAND_TIMEOUT_MS
        value: "0"
      - key: TRANSCRIPTION_TIMEOUT_MS
        value: "600000"
      - key: SUMMARY_TIMEOUT_MS
        value: "30000"
